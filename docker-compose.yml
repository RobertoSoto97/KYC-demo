services:
  postgres:
    image: postgres:15-alpine
    container_name: kyc-postgres
    environment:
      POSTGRES_DB: kycdb
      POSTGRES_USER: kycuser
      POSTGRES_PASSWORD: kycpass
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kycuser -d kycdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kyc-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kycdb
      SPRING_DATASOURCE_USERNAME: kycuser
      SPRING_DATASOURCE_PASSWORD: kycpass
      KYC_UPLOAD_DIR: /app/uploads
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"
    volumes:
      # Los documentos subidos se persisten fuera del contenedor
      - kyc_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: kyc-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  kyc_uploads:
