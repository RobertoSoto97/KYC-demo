spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kycdb}
    username: ${SPRING_DATASOURCE_USERNAME:kycuser}
    password: ${SPRING_DATASOURCE_PASSWORD:kycpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB

# Directorio donde se guardan los documentos subidos por los usuarios
kyc:
  upload-dir: ${KYC_UPLOAD_DIR:/app/uploads}

# Usuario admin por defecto (en producción usar base de datos + BCrypt)
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin123}

server:
  port: 8080

logging:
  level:
    com.kycdemo: DEBUG
